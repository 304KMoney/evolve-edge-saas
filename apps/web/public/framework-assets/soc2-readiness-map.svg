<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="36" fill="#F4FBFC"/>
  <rect x="40" y="40" width="1320" height="820" rx="32" fill="url(#bg)"/>
  <rect x="88" y="92" width="400" height="716" rx="28" fill="#0F172A"/>
  <text x="128" y="152" fill="#67E8F9" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6">SOC 2 READINESS</text>
  <text x="128" y="212" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">Trust service</text>
  <text x="128" y="272" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="54" font-weight="700">criteria view</text>
  <text x="128" y="336" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="26">Use this visual to explain what leadership, security reviewers, and</text>
  <text x="128" y="372" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="26">operators should expect from a disciplined readiness workflow.</text>
  <g fill="#111827">
    <rect x="128" y="444" width="320" height="92" rx="24" fill="#E6FFFB"/>
    <rect x="128" y="556" width="320" height="92" rx="24" fill="#EFF6FF"/>
    <rect x="128" y="668" width="320" height="92" rx="24" fill="#FEF3C7"/>
  </g>
  <text x="156" y="488" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">5 trust criteria</text>
  <text x="156" y="518" fill="#334155" font-family="Arial, sans-serif" font-size="22">Security, availability, confidentiality,</text>
  <text x="156" y="546" fill="#334155" font-family="Arial, sans-serif" font-size="22">processing integrity, privacy.</text>
  <text x="156" y="600" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="18" font-weight="700">Evidence lanes</text>
  <text x="156" y="630" fill="#334155" font-family="Arial, sans-serif" font-size="22">Policy posture, access discipline, vendor</text>
  <text x="156" y="658" fill="#334155" font-family="Arial, sans-serif" font-size="22">oversight, and workflow traceability.</text>
  <text x="156" y="712" fill="#B45309" font-family="Arial, sans-serif" font-size="18" font-weight="700">Executive outputs</text>
  <text x="156" y="742" fill="#334155" font-family="Arial, sans-serif" font-size="22">Risk framing, prioritized findings,</text>
  <text x="156" y="770" fill="#334155" font-family="Arial, sans-serif" font-size="22">and 30/60/90 day roadmap.</text>

  <text x="560" y="132" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">TRUST SERVICE CRITERIA</text>
  <g>
    <rect x="560" y="168" width="220" height="88" rx="24" fill="#E0F2FE"/>
    <rect x="798" y="168" width="220" height="88" rx="24" fill="#DCFCE7"/>
    <rect x="1036" y="168" width="220" height="88" rx="24" fill="#FCE7F3"/>
    <rect x="679" y="274" width="220" height="88" rx="24" fill="#FEF3C7"/>
    <rect x="917" y="274" width="220" height="88" rx="24" fill="#EDE9FE"/>
  </g>
  <text x="588" y="220" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Security</text>
  <text x="838" y="220" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Availability</text>
  <text x="1066" y="220" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Privacy</text>
  <text x="704" y="326" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Confidentiality</text>
  <text x="943" y="326" fill="#0F172A" font-family="Arial, sans-serif" font-size="25" font-weight="700">Processing integrity</text>

  <text x="560" y="424" fill="#0F172A" font-family="Arial, sans-serif" font-size="24" font-weight="700">EVIDENCE + OPERATING SIGNALS</text>
  <g stroke="#94A3B8" stroke-width="3" stroke-dasharray="10 10">
    <line x1="670" y1="362" x2="670" y2="408"/>
    <line x1="908" y1="362" x2="908" y2="408"/>
    <line x1="1146" y1="256" x2="1146" y2="408"/>
  </g>
  <g>
    <rect x="560" y="456" width="208" height="108" rx="24" fill="#FFFFFF"/>
    <rect x="786" y="456" width="208" height="108" rx="24" fill="#FFFFFF"/>
    <rect x="1012" y="456" width="208" height="108" rx="24" fill="#FFFFFF"/>
    <rect x="673" y="584" width="208" height="108" rx="24" fill="#FFFFFF"/>
    <rect x="899" y="584" width="208" height="108" rx="24" fill="#FFFFFF"/>
  </g>
  <text x="590" y="500" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Policies</text>
  <text x="590" y="530" fill="#334155" font-family="Arial, sans-serif" font-size="24">AI governance</text>
  <text x="590" y="558" fill="#334155" font-family="Arial, sans-serif" font-size="24">and security posture</text>
  <text x="816" y="500" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Evidence</text>
  <text x="816" y="530" fill="#334155" font-family="Arial, sans-serif" font-size="24">Vendor, model, and</text>
  <text x="816" y="558" fill="#334155" font-family="Arial, sans-serif" font-size="24">control documentation</text>
  <text x="1042" y="500" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Telemetry</text>
  <text x="1042" y="530" fill="#334155" font-family="Arial, sans-serif" font-size="24">Access, logging, and</text>
  <text x="1042" y="558" fill="#334155" font-family="Arial, sans-serif" font-size="24">operational discipline</text>
  <text x="703" y="628" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Review gate</text>
  <text x="703" y="658" fill="#334155" font-family="Arial, sans-serif" font-size="24">QA review and</text>
  <text x="703" y="686" fill="#334155" font-family="Arial, sans-serif" font-size="24">executive delivery sync</text>
  <text x="929" y="628" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">Outputs</text>
  <text x="929" y="658" fill="#334155" font-family="Arial, sans-serif" font-size="24">Executive summary,</text>
  <text x="929" y="686" fill="#334155" font-family="Arial, sans-serif" font-size="24">findings, roadmap</text>

  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="1360" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6F5F7"/>
