<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" rx="36" fill="#F8FAFC"/>
  <rect x="56" y="56" width="1288" height="788" rx="32" fill="#FFFFFF"/>
  <text x="104" y="138" fill="#0F766E" font-family="Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="5">SOC 2 EVIDENCE FLOW</text>
  <text x="104" y="202" fill="#0F172A" font-family="Arial, sans-serif" font-size="56" font-weight="700">How the website should explain</text>
  <text x="104" y="264" fill="#0F172A" font-family="Arial, sans-serif" font-size="56" font-weight="700">delivery without certification hype</text>
  <text x="104" y="326" fill="#64748B" font-family="Arial, sans-serif" font-size="27">Show the flow from intake to report delivery so buyers can see operating rigor,</text>
  <text x="104" y="364" fill="#64748B" font-family="Arial, sans-serif" font-size="27">not vague claims about automated compliance.</text>

  <g>
    <rect x="104" y="442" width="244" height="226" rx="28" fill="#ECFEFF"/>
    <rect x="396" y="442" width="244" height="226" rx="28" fill="#EFF6FF"/>
    <rect x="688" y="442" width="244" height="226" rx="28" fill="#F8FAFC"/>
    <rect x="980" y="442" width="244" height="226" rx="28" fill="#FEF3C7"/>
  </g>
  <text x="132" y="492" fill="#0F766E" font-family="Arial, sans-serif" font-size="18" font-weight="700">STEP 1</text>
  <text x="132" y="532" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">Structured intake</text>
  <text x="132" y="574" fill="#334155" font-family="Arial, sans-serif" font-size="23">Collect frameworks,</text>
  <text x="132" y="604" fill="#334155" font-family="Arial, sans-serif" font-size="23">AI usage, and buyer</text>
  <text x="132" y="634" fill="#334155" font-family="Arial, sans-serif" font-size="23">operating context.</text>

  <text x="424" y="492" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="18" font-weight="700">STEP 2</text>
  <text x="424" y="532" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">Evidence shaping</text>
  <text x="424" y="574" fill="#334155" font-family="Arial, sans-serif" font-size="23">Translate policies,</text>
  <text x="424" y="604" fill="#334155" font-family="Arial, sans-serif" font-size="23">vendors, and control</text>
  <text x="424" y="634" fill="#334155" font-family="Arial, sans-serif" font-size="23">signals into reviewable state.</text>

  <text x="716" y="492" fill="#475569" font-family="Arial, sans-serif" font-size="18" font-weight="700">STEP 3</text>
  <text x="716" y="532" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">QA + packaging</text>
  <text x="716" y="574" fill="#334155" font-family="Arial, sans-serif" font-size="23">Keep report versions,</text>
  <text x="716" y="604" fill="#334155" font-family="Arial, sans-serif" font-size="23">review notes, and</text>
  <text x="716" y="634" fill="#334155" font-family="Arial, sans-serif" font-size="23">delivery status visible.</text>

  <text x="1008" y="492" fill="#B45309" font-family="Arial, sans-serif" font-size="18" font-weight="700">STEP 4</text>
  <text x="1008" y="532" fill="#0F172A" font-family="Arial, sans-serif" font-size="32" font-weight="700">Executive output</text>
  <text x="1008" y="574" fill="#334155" font-family="Arial, sans-serif" font-size="23">Deliver summaries,</text>
  <text x="1008" y="604" fill="#334155" font-family="Arial, sans-serif" font-size="23">findings, and roadmap</text>
  <text x="1008" y="634" fill="#334155" font-family="Arial, sans-serif" font-size="23">without false assurance claims.</text>

  <g stroke="#94A3B8" stroke-width="8" stroke-linecap="round">
    <line x1="348" y1="555" x2="396" y2="555"/>
    <line x1="640" y1="555" x2="688" y2="555"/>
    <line x1="932" y1="555" x2="980" y2="555"/>
  </g>
  <g fill="#0F766E">
    <circle cx="372" cy="555" r="10"/>
    <circle cx="664" cy="555" r="10"/>
    <circle cx="956" cy="555" r="10"/>
  </g>

  <rect x="104" y="720" width="1120" height="82" rx="24" fill="#0F172A"/>
  <text x="140" y="770" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24">
    Website messaging rule: describe readiness, evidence discipline, and report quality. Do not claim SOC 2 certification unless it is independently true.
  </text>
</svg>
