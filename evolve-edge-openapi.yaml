openapi: 3.0.3
info:
  title: Evolve Edge API
  version: 1.0.0
  description: >
    REST API for Evolve Edge, a multi-tenant AI-powered cybersecurity compliance
    platform. This specification covers authentication, organizations, team
    management, frameworks, documents, analysis jobs, findings, tasks,
    dashboards, reports, auditor access, notifications, and audit logs.

servers:
  - url: /api/v1
    description: Relative API base URL

tags:
  - name: Auth
  - name: Users
  - name: Organizations
  - name: Members
  - name: Frameworks
  - name: Documents
  - name: Analysis
  - name: Findings
  - name: Tasks
  - name: Dashboard
  - name: Reports
  - name: Auditor Access
  - name: Notifications
  - name: Audit Logs
  - name: Internal Webhooks

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyEmailResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitedError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    patch:
      tags: [Users]
      summary: Update current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /organizations:
    get:
      tags: [Organizations]
      summary: List organizations for current user
      responses:
        '200':
          description: Organizations list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
    post:
      tags: [Organizations]
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrganizationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /organizations/{organizationId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Organizations]
      summary: Get organization
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Organizations]
      summary: Update organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /organizations/{organizationId}/members:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Members]
      summary: List organization members
      responses:
        '200':
          description: Members list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipListResponse'

  /organizations/{organizationId}/members/invite:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Members]
      summary: Invite organization member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteMemberResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /organization-invites/accept:
    post:
      tags: [Members]
      summary: Accept organization invite
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        '200':
          description: Invite accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInviteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /organizations/{organizationId}/members/{memberId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/MemberId'
    patch:
      tags: [Members]
      summary: Update member role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    delete:
      tags: [Members]
      summary: Remove member
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemovedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenError'

  /frameworks:
    get:
      tags: [Frameworks]
      summary: List available compliance frameworks
      responses:
        '200':
          description: Frameworks list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkListResponse'

  /frameworks/{frameworkId}/controls:
    parameters:
      - $ref: '#/components/parameters/FrameworkId'
    get:
      tags: [Frameworks]
      summary: List controls for framework
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        '200':
          description: Control list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlListResponse'

  /organizations/{organizationId}/frameworks:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Frameworks]
      summary: List organization frameworks
      responses:
        '200':
          description: Enabled frameworks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkListResponse'
    post:
      tags: [Frameworks]
      summary: Enable frameworks for organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnableFrameworksRequest'
      responses:
        '200':
          description: Frameworks enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnableFrameworksResponse'

  /organizations/{organizationId}/documents:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Documents]
      summary: List documents
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: parse_status
          schema:
            $ref: '#/components/schemas/DocumentParseStatus'
        - in: query
          name: search
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Documents list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
    post:
      tags: [Documents]
      summary: Upload document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, category]
              properties:
                file:
                  type: string
                  format: binary
                category:
                  type: string
                tags:
                  type: string
                  description: Comma-separated tags
                description:
                  type: string
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /organizations/{organizationId}/documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/DocumentId'
    get:
      tags: [Documents]
      summary: Get document metadata
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Documents]
      summary: Delete document
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemovedResponse'

  /organizations/{organizationId}/documents/{documentId}/parsed-text:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/DocumentId'
    get:
      tags: [Documents]
      summary: Get parsed document text
      responses:
        '200':
          description: Parsed text returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParsedTextResponse'

  /organizations/{organizationId}/analysis-jobs:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Analysis]
      summary: List analysis jobs
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/AnalysisJobStatus'
        - in: query
          name: framework_id
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Analysis jobs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisJobListResponse'
    post:
      tags: [Analysis]
      summary: Start analysis job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnalysisJobRequest'
      responses:
        '202':
          description: Analysis job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisJobQueuedResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /organizations/{organizationId}/analysis-jobs/{jobId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/JobId'
    get:
      tags: [Analysis]
      summary: Get analysis job
      responses:
        '200':
          description: Analysis job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisJobResponse'

  /organizations/{organizationId}/analysis-jobs/{jobId}/retry:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/JobId'
    post:
      tags: [Analysis]
      summary: Retry failed analysis job
      responses:
        '202':
          description: Retry queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalysisJobQueuedResponse'

  /organizations/{organizationId}/findings:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Findings]
      summary: List findings
      parameters:
        - in: query
          name: framework_id
          schema:
            type: string
        - in: query
          name: severity
          schema:
            $ref: '#/components/schemas/FindingSeverity'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/FindingStatus'
        - in: query
          name: control_id
          schema:
            type: string
        - in: query
          name: assigned_to
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Findings list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingListResponse'

  /organizations/{organizationId}/findings/{findingId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/FindingId'
    get:
      tags: [Findings]
      summary: Get finding
      responses:
        '200':
          description: Finding details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingResponse'
    patch:
      tags: [Findings]
      summary: Update finding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFindingRequest'
      responses:
        '200':
          description: Finding updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /organizations/{organizationId}/findings/{findingId}/notes:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/FindingId'
    post:
      tags: [Findings]
      summary: Add note to finding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFindingNoteRequest'
      responses:
        '201':
          description: Note added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindingNoteResponse'

  /organizations/{organizationId}/findings/{findingId}/evidence:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/FindingId'
    post:
      tags: [Findings]
      summary: Attach evidence document to finding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachEvidenceRequest'
      responses:
        '201':
          description: Evidence attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachEvidenceResponse'

  /organizations/{organizationId}/tasks:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Tasks]
      summary: List remediation tasks
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - in: query
          name: assigned_to
          schema:
            type: string
        - in: query
          name: due_before
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Tasks list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
    post:
      tags: [Tasks]
      summary: Create remediation task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /organizations/{organizationId}/tasks/{taskId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/TaskId'
    patch:
      tags: [Tasks]
      summary: Update remediation task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /organizations/{organizationId}/dashboard/summary:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Dashboard]
      summary: Get compliance dashboard summary
      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummaryResponse'

  /organizations/{organizationId}/dashboard/frameworks/{frameworkId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/FrameworkId'
    get:
      tags: [Dashboard]
      summary: Get framework dashboard
      responses:
        '200':
          description: Framework dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkDashboardResponse'

  /organizations/{organizationId}/reports:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Reports]
      summary: List reports
      responses:
        '200':
          description: Reports list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
    post:
      tags: [Reports]
      summary: Generate report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '202':
          description: Report generation queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportQueuedResponse'

  /organizations/{organizationId}/reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get report metadata
      responses:
        '200':
          description: Report metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'

  /organizations/{organizationId}/reports/{reportId}/download:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Reports]
      summary: Get report download URL
      responses:
        '200':
          description: Download URL returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDownloadResponse'

  /organizations/{organizationId}/auditor-links:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    post:
      tags: [Auditor Access]
      summary: Create auditor share link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditorLinkRequest'
      responses:
        '201':
          description: Auditor link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAuditorLinkResponse'

  /auditor-access/session:
    post:
      tags: [Auditor Access]
      summary: Start auditor session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditorSessionRequest'
      responses:
        '200':
          description: Auditor session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditorSessionResponse'

  /auditor-access/reports:
    get:
      tags: [Auditor Access]
      summary: List reports available to auditor
      security:
        - auditorTokenAuth: []
      responses:
        '200':
          description: Shared reports list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'

  /auditor-access/reports/{reportId}:
    parameters:
      - $ref: '#/components/parameters/ReportId'
    get:
      tags: [Auditor Access]
      summary: Get shared report
      security:
        - auditorTokenAuth: []
      responses:
        '200':
          description: Shared report metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [unread, read]
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'

  /notifications/{notificationId}/read:
    parameters:
      - $ref: '#/components/parameters/NotificationId'
    post:
      tags: [Notifications]
      summary: Mark notification as read
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'

  /organizations/{organizationId}/audit-logs:
    parameters:
      - $ref: '#/components/parameters/OrganizationId'
    get:
      tags: [Audit Logs]
      summary: List audit logs
      parameters:
        - in: query
          name: actor_user_id
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: resource_type
          schema:
            type: string
        - in: query
          name: resource_id
          schema:
            type: string
        - in: query
          name: start_date
          schema:
            type: string
            format: date-time
        - in: query
          name: end_date
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Audit logs list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

  /internal/webhooks/document-parse-completed:
    post:
      tags: [Internal Webhooks]
      summary: Parsing service callback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentParseCompletedWebhook'
      responses:
        '200':
          description: Webhook accepted

  /internal/webhooks/analysis-completed:
    post:
      tags: [Internal Webhooks]
      summary: Analysis service callback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisCompletedWebhook'
      responses:
        '200':
          description: Webhook accepted

  /internal/webhooks/report-completed:
    post:
      tags: [Internal Webhooks]
      summary: Report generation callback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCompletedWebhook'
      responses:
        '200':
          description: Webhook accepted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    auditorTokenAuth:
